---
name: Validate Code

on:
    workflow_dispatch:

jobs:

    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-versions: ["3.10","3.11","3.12"]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set-up Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{matrix.python-versions}}

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Lint the code
              run: pylint app.py